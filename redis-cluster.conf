# Redis Cluster Configuration
# Optimized for high availability and performance

# Networking
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Cluster mode
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
# Allow partial cluster operation
cluster-require-full-coverage no

# Persistence - AOF (Append Only File) for durability
appendonly yes
# Balance between performance and durability
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Disable RDB snapshots (we use AOF instead)
save ""

# Memory management
maxmemory 512gb
# Evict least recently used keys when memory is full
maxmemory-policy allkeys-lru

# Performance tuning
hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Logging
loglevel notice
# Log to stdout for Docker
logfile ""

# Security (add password in production)
# requirepass your-strong-password-here
# masterauth your-strong-password-here

# Slow log (10ms threshold)
slowlog-log-slower-than 10000
slowlog-max-len 128
