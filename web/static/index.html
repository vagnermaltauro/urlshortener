<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniShort - Encurtador de URLs</title>

    <style>
        /* ========== Reset & Base Styles ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
                         Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* ========== Container ========== */
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        /* ========== Typography ========== */
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        /* ========== Form Elements ========== */
        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="url"] {
            padding: 15px;
            font-size: 1.1em;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="url"]:invalid {
            border-color: #ff6b6b;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2em;
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ========== Result Display ========== */
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        #result.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #result a {
            color: #667eea;
            font-size: 1.3em;
            font-weight: 600;
            text-decoration: none;
            word-break: break-all;
        }

        #result a:hover {
            text-decoration: underline;
        }

        .copy-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 0.9em;
            width: auto;
            background: #48bb78;
            display: inline-block;
        }

        .copy-btn:hover {
            background: #38a169;
        }

        /* ========== Messages ========== */
        .message {
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #fee;
            color: #c53030;
            border: 1px solid #fc8181;
        }

        .message.success {
            background: #f0fff4;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        /* ========== Loading Spinner ========== */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner.show {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== Metadata ========== */
        .metadata {
            margin-top: 15px;
            font-size: 0.9em;
            color: #666;
        }

        .metadata strong {
            color: #333;
        }

        /* ========== Responsive Design ========== */
        @media (max-width: 768px) {
            body {
                margin: 20px auto;
            }

            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            input[type="url"],
            button {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 MiniShort</h1>
        <p class="subtitle">Encurte suas URLs em segundos</p>

        <form id="urlForm" aria-label="Formulário de encurtamento de URL">
            <label for="urlInput">Cole sua URL longa:</label>
            <input
                type="url"
                id="urlInput"
                name="url"
                placeholder="https://exemplo.com/sua-url-muito-longa"
                required
                aria-required="true"
                aria-describedby="urlHelp"
            >
            <button type="submit" id="submitBtn" aria-label="Encurtar URL">
                Encurtar URL
            </button>
        </form>

        <div class="spinner" id="spinner" role="status" aria-live="polite">
            <span class="sr-only">Processando...</span>
        </div>

        <div class="message error" id="errorMessage" role="alert" aria-live="assertive"></div>
        <div class="message success" id="successMessage" role="status" aria-live="polite"></div>

        <div id="result" role="region" aria-label="Resultado do encurtamento">
            <p>✅ URL encurtada com sucesso!</p>
            <a id="shortUrl" href="#" target="_blank" rel="noopener noreferrer"></a>
            <div class="metadata">
                <p><strong>Código:</strong> <span id="shortCode"></span></p>
                <p><strong>Expira em:</strong> <span id="expiresAt"></span></p>
            </div>
            <button class="copy-btn" id="copyBtn" aria-label="Copiar URL encurtada">
                📋 Copiar Link
            </button>
        </div>
    </div>

    <script>
        // ========== DOM Elements ==========
        const form = document.getElementById('urlForm');
        const urlInput = document.getElementById('urlInput');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const result = document.getElementById('result');
        const shortUrl = document.getElementById('shortUrl');
        const shortCode = document.getElementById('shortCode');
        const expiresAt = document.getElementById('expiresAt');
        const copyBtn = document.getElementById('copyBtn');

        // ========== Utility Functions ==========
        function showSpinner() {
            spinner.classList.add('show');
            submitBtn.disabled = true;
        }

        function hideSpinner() {
            spinner.classList.remove('show');
            submitBtn.disabled = false;
        }

        function showError(message) {
            hideMessages();
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            hideMessages();
            successMessage.textContent = '✅ ' + message;
            successMessage.classList.add('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            // NÃO esconde o result aqui - ele deve permanecer visível
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('pt-BR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ========== Form Submission ==========
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = urlInput.value.trim();

            // Client-side validation
            if (!url) {
                showError('Por favor, insira uma URL');
                return;
            }

            try {
                new URL(url); // Validate URL format
            } catch {
                showError('Por favor, insira uma URL válida (ex: https://exemplo.com)');
                return;
            }

            hideMessages();
            result.classList.remove('show'); // Esconde resultado anterior
            showSpinner();

            try {
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                console.log('Response status:', response.status);
                console.log('Response data:', data);

                if (!response.ok) {
                    throw new Error(data.message || data.error || 'Erro ao encurtar URL');
                }

                // Display result
                console.log('Setting shortUrl...');
                shortUrl.href = data.short_url;
                shortUrl.textContent = data.short_url;
                shortCode.textContent = data.short_code;
                expiresAt.textContent = formatDate(data.expires_at);

                console.log('Showing result div...');
                result.classList.add('show');

                console.log('Showing success message...');
                showSuccess('URL encurtada com sucesso!');

                // Clear input
                urlInput.value = '';

            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'Erro ao conectar com o servidor. Tente novamente.');
            } finally {
                hideSpinner();
            }
        });

        // ========== Copy to Clipboard ==========
        copyBtn.addEventListener('click', async () => {
            const urlText = shortUrl.textContent;

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(urlText);
                } else {
                    // Fallback for older browsers
                    const textArea = document.createElement('textarea');
                    textArea.value = urlText;
                    textArea.style.position = 'fixed';
                    textArea.style.opacity = '0';
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }

                showSuccess('Link copiado para a área de transferência!');
                copyBtn.textContent = '✅ Copiado!';

                setTimeout(() => {
                    copyBtn.textContent = '📋 Copiar Link';
                }, 2000);

            } catch (error) {
                console.error('Copy error:', error);
                showError('Erro ao copiar. Por favor, copie manualmente.');
            }
        });

        // ========== Input Focus on Load ==========
        window.addEventListener('load', () => {
            urlInput.focus();
        });
    </script>
</body>
</html>
